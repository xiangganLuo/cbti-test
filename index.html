<html lang='zh-CN'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no'>
  <title>当代人精神状态人格测试 · 猫系版</title>
  <link rel='stylesheet' href='./styles.css'>
</head>
<body>
  <div class='app'>
    <header>
      <div class='topbar'>
        <div style='font-weight:700;'>CBTI</div>
        <div class='link' id='restartLink' title='重新测试'>重新测试</div>
      </div>
    </header>

    <section id='screen-home' class='card center'>
      <h1>当代人精神状态人格测试</h1>
      <h2>测测你现在的精神状态属于哪一类</h2>
      <button id='startBtn' class='big-btn'>开始测试</button>
      <div class='muted'>本测试仅供娱乐，非专业心理评估，不构成任何建议</div>
    </section>

    <section id='screen-quiz' class='card hidden'>
      <div class='progress' id='progressText'>第 1/18 题</div>
      <div id='questionText' style='font-size:18px;font-weight:600;'></div>
      <div class='options' id='optionsBox'></div>
    </section>

    <section id='screen-result' class='card hidden'>
      <div class='result-title' id='resultTitle'>你的人格类型：—</div>
      <div class='result-desc' id='resultDesc'></div>
      <div class='row' style='margin-top:12px;'>
        <button id='saveBtn' class='big-btn' style='background:#334155;' disabled>保存图片</button>
      </div>
      <div class='preview' id='previewWrap'><img id='previewImg' alt='预览'/></div>
      <div class='muted'>仅娱乐，无科学依据</div>
    </section>

    <footer>© CBTI · 仅娱乐用途 · 不收集任何信息</footer>
  </div>

  <div class='spinner' id='spinner'><div class='lds'></div></div>
  <div class='toast' id='toast'>图片已保存</div>

  <script src='./app.js'></script>
</body>
</html>
